<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Catalog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container">
        <a class="navbar-brand" href="/">Simple BookStore</a>
        <div>
            <a class="btn btn-outline-primary me-2" href="/catalog">Catalog</a>
            <a class="btn btn-link" href="/login">Login</a>
        </div>
    </div>
</nav>

<div class="container py-4">
    <h2>Catalog</h2>
    <div class="row">
        <div class="col-md-4 mb-3" th:each="book : ${books}">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title" th:text="${book.title}"></h5>
                    <h6 class="card-subtitle mb-2 text-muted" th:text="${book.author}"></h6>
                    <p class="card-text" th:text="${book.description}"></p>
                </div>
                <div class="card-footer">
                    <strong th:text="${book.price}"></strong>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
